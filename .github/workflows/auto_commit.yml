name: Auto Commit

on:
  schedule:
    # 8 runs/day, spread across waking hours (UTC).
    # Adjust these if your LOCAL_TZ offset differs from UTC-5 (Eastern).
    # The Python script adds a 0-30 min jitter and re-checks local time,
    # so these exact minute values don't matter much — they're just triggers.
    - cron: "15 11 * * *"   # 06:15 UTC → ~07:15 ET
    - cron: "45 12 * * *"   # 07:45 UTC → ~08:45 ET
    - cron: "20 14 * * *"   # 09:20 UTC → ~10:20 ET
    - cron: "50 15 * * *"   # 10:50 UTC → ~11:50 ET
    - cron: "10 17 * * *"   # 12:10 UTC → ~13:10 ET
    - cron: "35 19 * * *"   # 14:35 UTC → ~15:35 ET
    - cron: "55 21 * * *"   # 16:55 UTC → ~17:55 ET
    - cron: "25 01 * * *"   # 20:25 UTC → ~21:25 ET  (next UTC day)
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write           # needed so the runner can push commits

jobs:
  maybe-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works cleanly
          fetch-depth: 0
          # Use the built-in GITHUB_TOKEN so pushes are attributed correctly
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run auto-commit script
        env:
          GIT_USER_NAME:  ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          LOCAL_TZ:       ${{ vars.LOCAL_TZ }}       # e.g. "America/New_York"
          COMMIT_PROB:    ${{ vars.COMMIT_PROB }}    # e.g. "0.72"  (optional)
        run: python auto_commit.py
