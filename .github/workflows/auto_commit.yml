name: Auto Commit

on:
  schedule:
    # 8 runs/day, spread across waking hours (UTC).
    # Crons are in UTC — offset by +6 for Central Time.
    # The Python script adds a 0-30 min jitter and re-checks local time,
    # so these exact minute values don't matter much — they're just triggers.
    - cron: "15 12 * * *"   # 07:15 CT
    - cron: "45 13 * * *"   # 08:45 CT
    - cron: "20 15 * * *"   # 10:20 CT
    - cron: "50 16 * * *"   # 11:50 CT
    - cron: "10 18 * * *"   # 13:10 CT
    - cron: "35 20 * * *"   # 15:35 CT
    - cron: "55 22 * * *"   # 17:55 CT
    - cron: "25 02 * * *"   # 21:25 CT  (next UTC day)
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write           # needed so the runner can push commits

jobs:
  maybe-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git remote with PAT
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run auto-commit script
        env:
          GIT_USER_NAME:  ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          LOCAL_TZ:       ${{ vars.LOCAL_TZ }}
          COMMIT_PROB:    ${{ vars.COMMIT_PROB }}
        run: python auto_commit.py